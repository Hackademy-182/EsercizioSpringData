<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Create authors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    
    <h1 class="text-center">Inserisci un nuovo autore</h1>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-9">
                <form th:action="@{/authors}" method="post" th:object="${author}">
                    <div class="col mt-2">
                        <label for="text" class="form-label">Inserisci nome</label>
                        <input type="text" class="form-control" placeholder="Nome" aria-label="Nome" th:field="*{name}" required>
                    </div>
                    <div class="col mt-2">
                        <label for="text" class="form-label">Inserisci cognome</label>
                        <input type="text" class="form-control" placeholder="Cognome" aria-label="Cognome" th:field="*{surname}" required>
                    </div>
                    <div class="col mt-2">
                        <label for="inputEmail4" class="form-label">Inserisci email</label>
                        <input type="email" class="form-control" placeholder="Email" id="inputEmail4" th:field="*{email}" required>
                    </div>
                    <div class="d-flex justify-content-center">
                        <div class="p-2">
                            <button class="btn btn-primary" type="submit">Aggiungi autore</button>
                        </div>
                        <div class="p-2">
                            <button class="btn btn-danger" type="reset">Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
